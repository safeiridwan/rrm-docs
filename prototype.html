        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }

        .progress-bar { transition: width 0.5s ease-in-out; }
        /* Seat Monitoring Styles */
        .seat-filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 24px; }
        .seat-filter-bar select { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #334155; cursor: pointer; }

        @media (max-width: 768px) { .seat-stat-cards { grid-template-columns: repeat(2, 1fr); } }
        .seat-stat-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #f1f5f9; text-align: center; }
        .seat-stat-card .stat-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .seat-stat-card .stat-value { font-size: 24px; font-weight: 800; color: #0f172a; }
        .seat-stat-card .stat-value.red { color: #ef4444; }
        .seat-stat-card .stat-value.amber { color: #f59e0b; }
        .seat-stat-card .stat-value.blue { color: #3b82f6; }
        .seat-package-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 24px; overflow: hidden; }
        .seat-package-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 28px; cursor: pointer; transition: background 0.2s; user-select: none; }
        .seat-package-header:hover { background: #f8fafc; }
        .seat-package-toggle { width: 32px; height: 32px; border-radius: 8px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; margin-left: 12px; flex-shrink: 0; }
        .seat-package-toggle.collapsed { transform: rotate(-90deg); }

        .seat-package-body.collapsed { max-height: 0; padding: 0 28px; opacity: 0; }
        .seat-package-info h4 { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
        .seat-package-meta { display: flex; gap: 16px; font-size: 12px; color: #64748b; font-weight: 600; }
        .seat-occupancy-rate { font-size: 28px; font-weight: 900; }
        .seat-occupancy-rate.red { color: #ef4444; }
        .seat-occupancy-rate.amber { color: #f59e0b; }
        .seat-occupancy-rate.blue { color: #3b82f6; }
        .seat-progress-container { margin-bottom: 20px; }
        .seat-progress-bar { width: 100%; height: 10px; background: #f1f5f9; border-radius: 9999px; overflow: hidden; }
        .seat-progress-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
        .seat-progress-fill.red { background: #ef4444; }
        .seat-progress-fill.amber { background: #f59e0b; }
        .seat-progress-fill.blue { background: #3b82f6; }
        .seat-progress-stats { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: #64748b; margin-top: 6px; }
        .seat-map-container { display: flex; flex-direction: column; gap: 12px; }
        .seat-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        @media (max-width: 1024px) { .seat-row { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 640px) { .seat-row { grid-template-columns: repeat(2, 1fr); } }
        .seat-slot { position: relative; border-radius: 14px; padding: 16px 12px; transition: all 0.2s ease; cursor: pointer; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; }
        .seat-slot.occupied { background: #f8fafc; border: 2px solid #e2e8f0; }
        .seat-slot.occupied:hover { border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); }
        .seat-slot.available { background: #fafafa; border: 2px dashed #cbd5e1; }
        .seat-slot.available:hover { border-color: #3b82f6; background: #eff6ff; }
        .seat-slot.dimmed { opacity: 0.3; }
        .seat-slot .seat-number { position: absolute; top: 8px; left: 10px; font-size: 11px; font-weight: 800; color: #94a3b8; }
        .seat-slot .seat-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: white; margin-bottom: 8px; align-self: center; margin-top: 8px; }
        .seat-slot .seat-avatar.male { background: #3b82f6; }
        .seat-slot .seat-avatar.female { background: #ec4899; }
        .seat-slot .seat-name { font-size: 13px; font-weight: 700; color: #0f172a; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }

        .seat-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 16px; border-radius: 12px; font-size: 12px; white-space: nowrap; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .seat-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #0f172a; }
        .seat-slot:hover .seat-tooltip { opacity: 1; }

        .seat-tooltip-label { color: #94a3b8; font-weight: 600; }

        .form-input, .form-select, .form-textarea { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #0f172a; transition: all 0.2s; font-family: 'Inter', sans-serif; }

        function getJamaahForPackage(packageName, bookedCount) {
            const matched = appData.jamaah.filter(j => j.package === packageName);
            const result = [];
            for (let i = 0; i < bookedCount; i++) {
                if (i < matched.length) {
                    result.push(matched[i]);
                } else {
                    result.push(null);
                }
            }
            return result;
        }

        function setSeatPackageFilter(pkg) {
            seatFilterState.package = pkg;
            updateSeatView();
        }

        function setSeatStatusFilter(status) {
            seatFilterState.status = status;
            document.querySelectorAll('.seat-status-tabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            updateSeatView();
        }

        function onSeatSearch(e) {
            seatFilterState.search = e.target.value.toLowerCase();
            updateSeatView();
        }

        function toggleCollapse(packageName) {
            const card = document.querySelector(`.seat-package-card[data-package="${packageName}"]`);
            if (!card) return;
            const body = card.querySelector('.seat-package-body');
            const toggle = card.querySelector('.seat-package-toggle');
            if (body.classList.contains('collapsed')) {
                body.classList.remove('collapsed');
                toggle.classList.remove('collapsed');
            } else {
                body.classList.add('collapsed');
                toggle.classList.add('collapsed');
            }
        }

        function updateSeatView() {
            const container = document.getElementById('seat-container');
            if (!container) return;
            container.innerHTML = renderSeatContent();

            if (!jamaah) return '';
            return `

        function renderSeatContent() {
            const { package: pkgFilter, status, search } = seatFilterState;
            let packages = appData.packages;
            if (pkgFilter !== 'all') {
                packages = packages.filter(p => p.name === pkgFilter);
            }

            const totalQuota = appData.packages.reduce((sum, p) => sum + p.quota, 0);
            const totalBooked = appData.packages.reduce((sum, p) => sum + p.booked, 0);
            const totalAvailable = totalQuota - totalBooked;
            const avgOccupancy = Math.round((totalBooked / totalQuota) * 100);

            const getOccColor = (rate) => rate >= 90 ? 'red' : rate >= 70 ? 'amber' : 'blue';
            const occColor = getOccColor(avgOccupancy);

            const statCards = `
                <div class="seat-stat-cards">
                    <div class="seat-stat-card">
                        <div class="stat-label">Total Kuota</div>
                        <div class="stat-value">${totalQuota}</div>
                    </div>
                    <div class="seat-stat-card">
                        <div class="stat-label">Terisi</div>
                        <div class="stat-value">${totalBooked}</div>
                    </div>
                    <div class="seat-stat-card">
                        <div class="stat-label">Tersedia</div>
                        <div class="stat-value ${occColor}">${totalAvailable}</div>
                    </div>
                    <div class="seat-stat-card">
                        <div class="stat-label">Occupancy</div>
                        <div class="stat-value ${occColor}">${avgOccupancy}%</div>
                    </div>
                </div>
            `;

            const packageCards = packages.map((p, index) => {
                const isFirst = index === 0;
                const collapsedClass = isFirst ? '' : 'collapsed';
                const occRate = Math.round((p.booked / p.quota) * 100);
                const pColor = getOccColor(occRate);
                const jamaahList = getJamaahForPackage(p.name, p.booked);
                const slots = [];

                for (let i = 1; i <= p.quota; i++) {
                    const isBooked = i <= p.booked;
                    const jamaah = isBooked ? jamaahList[i - 1] : null;
                    const isOccupied = isBooked && jamaah !== null;

                    if (status === 'booked' && !isOccupied) continue;
                    if (status === 'available' && isOccupied) continue;

                    let dimmed = false;
                    if (search && isOccupied) {
                        if (!jamaah.name.toLowerCase().includes(search)) {
                            dimmed = true;
                        }
                    }

                    if (isOccupied) {
                        const initials = jamaah.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                        const genderClass = jamaah.gender === 'W' ? 'female' : 'male';
                        const statusClass = jamaah.status === 'Lunas' ? 'status-lunas' : jamaah.status === 'DP' ? 'status-dp' : 'status-outstanding';
                        const passportClass = jamaah.passport === 'Ada' ? 'passport-ada' : jamaah.passport === 'Proses' ? 'passport-proses' : 'passport-expired';

                        slots.push(`
                            <div class="seat-slot occupied ${dimmed ? 'dimmed' : ''}">
                                <div class="seat-number">${String(i).padStart(2,'0')}</div>
                                <div class="seat-avatar ${genderClass}">${initials}</div>
                                <div class="seat-name" title="${jamaah.name}">${jamaah.name}</div>
                                <div class="seat-code">${jamaah.code}</div>
                                <div class="seat-badges">
                                    <span class="seat-badge ${statusClass}">${jamaah.status}</span>
                                    <span class="seat-badge ${passportClass}">${jamaah.passport}</span>
                                </div>
                                ${renderSeatTooltip(jamaah, i)}
                            </div>
                        `);
                    } else {
                        slots.push(`
                            <div class="seat-slot available ${dimmed ? 'dimmed' : ''}">
                                <div class="seat-number">${String(i).padStart(2,'0')}</div>
                                <div class="seat-available-content">
                                    <i class="fas fa-plus w-5 h-5"></i>
                                    <span>Tersedia</span>
                                </div>
                            </div>
                        `);
                    }
                }

                // Group into rows of 5
                const rows = [];
                for (let i = 0; i < slots.length; i += 5) {
                    rows.push(`<div class="seat-row">${slots.slice(i, i + 5).join('')}</div>`);
                }

                return `
                    <div class="seat-package-card" data-package="${p.name}">
                        <div class="seat-package-header" onclick="toggleCollapse('${p.name}')">
                            <div class="seat-package-info">
                                <h4>${p.name}</h4>
                                <div class="seat-package-meta">
                                    <span><i class="fas fa-tag w-3 h-3 inline"></i> ${p.code}</span>
                                    <span><i class="fas fa-calendar w-3 h-3 inline"></i> ${p.departure}</span>
                                    <span><i class="fas fa-money-bill w-3 h-3 inline"></i> ${formatIDR(p.price)}</span>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div class="seat-occupancy-rate ${pColor}">${occRate}%</div>
                                <div class="seat-package-toggle ${collapsedClass}">
                                    <i class="fas fa-chevron-down w-4 h-4 text-slate-400"></i>
                                </div>
                            </div>
                        </div>
                        <div class="seat-package-body ${collapsedClass}">
                            <div class="seat-progress-container">
                                <div class="seat-progress-bar">
                                    <div class="seat-progress-fill ${pColor}" style="width: ${occRate}%"></div>
                                </div>
                                <div class="seat-progress-stats">
                                    <span>${p.booked} Terisi</span>
                                    <span>${p.quota - p.booked} Tersedia</span>
                                    <span>${p.quota} Total</span>
                                </div>
                            </div>
                            <div class="seat-map-container">
                                ${rows.join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            return statCards + packageCards;
        }

        function openModalAgen() {
            const modal = document.getElementById('modal-agen');
            if (modal) {

                document.body.style.overflow = 'hidden';
            }
        }

        function closeModalAgen() {
            const modal = document.getElementById('modal-agen');
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                document.getElementById('form-agen').reset();
            }
        }

        function saveAgen() {
            const form = document.getElementById('form-agen');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            const newId = appData.agen.length > 0 ? Math.max(...appData.agen.map(a => a.id)) + 1 : 1;
            const newCode = 'AG-' + String(newId).padStart(3, '0');

            const newAgent = {
                id: newId,
                code: newCode,
                name: formData.get('agent_name'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                city: formData.get('city'),
                address: formData.get('address'),
                status: formData.get('status'),
                total: 0,
                commission: 0,
                rating: 0
            };

            appData.agen.push(newAgent);
            closeModalAgen();
            showToast('Agen baru berhasil ditambahkan!');
            navigate('agen');
        }

        function navigate(view) {
            const content = document.getElementById('content');
            const viewTitle = document.getElementById('view-title');
            
            if (views[view]) {
                content.innerHTML = `<div class="animate-fade-in">${views[view]()}</div>`;
                
                const titleMap = {
                    'dashboard': 'Dashboard Overview',
                    'jamaah': 'Master Jamaah',
                    'paket': 'Paket Keberangkatan',
                    'agen': 'Master Agen Travel',
                    'booking': 'New Booking Registration',
                    'seat': 'Seat Occupancy Monitoring',
                    'invoice': 'Financial Invoice Ledger',
                    'payment': 'History Pembayaran',
                    'outstanding': 'Outstanding Payment Control',
                    'manifest': 'Operational Manifest',
                    'passport': 'Passport Documents Storage',
                    'marketing': 'Referral Reward Program',
                    'settings': 'System Control Panel'
                };
                
                viewTitle.innerText = titleMap[view] || view;
            }

            // Update Active Class for Sidebar Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-view') === view;
                if (isActive) {
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-200');
                    btn.classList.remove('text-slate-600', 'hover:bg-slate-50');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-200');
                    btn.classList.add('text-slate-600', 'hover:bg-slate-50');
                }
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }

        window.onload = () => {
            // Wait for CDN libs
            setTimeout(() => {
                navigate('dashboard');
                
                // Toggle Sidebar Logic
                document.getElementById('toggle-sidebar').onclick = () => {
                    const sidebar = document.getElementById('sidebar');
                    const isCollapsed = sidebar.classList.contains('w-20');
                    
                    if (isCollapsed) {
                        sidebar.classList.remove('w-20');
                        sidebar.classList.add('w-64');
                        document.querySelectorAll('.sidebar-text').forEach(el => el.classList.remove('hidden'));
                    } else {
                        sidebar.classList.remove('w-64');
                        sidebar.classList.add('w-20');
                        document.querySelectorAll('.sidebar-text').forEach(el => el.classList.add('hidden'));
                    }
                };
            }, 100);
        };
